version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lobster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lobster
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: lobster
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: '--auth-host=md5 --auth-local=trust'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d lobster']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lobster-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'everysec', '--save', '3600 1 300 100 60 10000']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: lobster-chromadb
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  minio:
    image: minio/minio:latest
    container_name: lobster-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: lobster-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,ollama,host.docker.internal
      http_proxy: http://host.docker.internal:7890
      https_proxy: http://host.docker.internal:7890
      no_proxy: localhost,127.0.0.1,ollama,host.docker.internal
      ALL_PROXY: http://host.docker.internal:7890
      all_proxy: http://host.docker.internal:7890
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', '--version']
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    container_name: lobster-ollama-init
    restart: 'no'
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,ollama,host.docker.internal
      http_proxy: http://host.docker.internal:7890
      https_proxy: http://host.docker.internal:7890
      no_proxy: localhost,127.0.0.1,ollama,host.docker.internal
      ALL_PROXY: http://host.docker.internal:7890
      all_proxy: http://host.docker.internal:7890
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    entrypoint: ['/bin/sh']
    command:
      - '-c'
      - 'for i in 1 2 3 4 5; do ollama pull nomic-embed-text && exit 0; echo "pull failed, retry in 10s..."; sleep 10; done; exit 1'

  open-websearch:
    image: ghcr.io/aas-ee/open-web-search:latest
    container_name: lobster-open-websearch
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - ENABLE_CORS=true
      - CORS_ORIGIN=*
      - DEFAULT_SEARCH_ENGINE=bing
      - MODE=http
      - PORT=3000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/mcp']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  minio_data:
  ollama_data:
  open-websearch_data:
